# Change these first
owner: Kryptonote-Labs # Your GitHub organization or username, where this repository lives
repo: status.kryptonote.com # The name of this repository

sites:
  - name: Kryptonote Frontend
    url: https://www.kryptonote.com
  - name: Kryptonote File Upload
  - url: https://api.kryptonote.com

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.kryptonote.com
  # baseUrl: /your-repo-name
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Kryptonote
  introTitle: "**Kryptonote** status"
  introMessage: "See the uptime of the services powering Kryptonote"
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

